<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"/>
<title>NexPay — P2P Market</title>
<meta name="theme-color" content="#060910"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060910;
    --card: rgba(17, 25, 40, 0.85);
    --border: rgba(255, 255, 255, 0.08);
    --pri: #6ee7ff;
    --pri2: #7c3aed;
    --text: #f8fafc;
    --text-dim: #94a3b8;
  }

  * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; background-color: var(--bg); color: var(--text); overflow-x: hidden; }

  body {
    background-image:
      radial-gradient(at 100% 0%, rgba(124, 58, 237, 0.08) 0px, transparent 50%),
      radial-gradient(at 0% 100%, rgba(110, 231, 255, 0.05) 0px, transparent 50%);
    background-attachment: fixed;
  }

  /* MODERN HEADER */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px;
    background: rgba(6, 9, 16, 0.8);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 1000;
  }

  .brand { display: flex; align-items: center; gap: 8px; }
  .flag { width: 22px; height: 15px; border-radius: 3px; background: linear-gradient(#008751 33%, #fff 33% 66%, #008751 66%); }
  .brand strong { font-size: 16px; font-weight: 800; letter-spacing: -0.2px; }

  .select {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border);
    color: #fff; border-radius: 10px;
    padding: 6px 12px; font-size: 13px; font-weight: 600; outline: none;
  }

  /* TABS */
  .tabs { display: flex; background: rgba(255, 255, 255, 0.02); margin: 15px 20px; border-radius: 12px; padding: 4px; border: 1px solid var(--border); }
  .tab {
    flex: 1; text-align: center; padding: 10px; font-size: 14px;
    font-weight: 700; cursor: pointer; color: var(--text-dim);
    transition: all 0.2s ease; border-radius: 10px;
  }
  .tab.active { background: var(--pri); color: #060910; box-shadow: 0 4px 12px rgba(110, 231, 255, 0.2); }

  /* AD LIST */
  .ads { padding: 0 20px 100px; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
  .ad {
    display: flex; flex-direction: column; gap: 12px;
    padding: 20px; border-radius: 20px;
    background: var(--card);
    border: 1px solid var(--border);
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .ad-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .name { font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 5px; }
  .name::after { content: "✓"; background: #10b981; color: #fff; font-size: 9px; padding: 2px 4px; border-radius: 4px; }

  .stats { font-size: 11px; color: var(--text-dim); font-weight: 500; margin-top: 2px; }

  .price-row { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 5px; }
  .price { font-size: 22px; font-weight: 900; color: #fff; letter-spacing: -0.5px; }

  .meta { font-size: 12px; color: var(--text-dim); line-height: 1.6; }
  .meta strong { color: var(--text); }

  .btn {
    cursor: pointer; border: none; padding: 10px 24px; border-radius: 12px;
    font-weight: 800; font-size: 14px;
    background: linear-gradient(135deg, var(--pri), var(--pri2));
    color: #060910; transition: transform 0.1s;
  }
  .btn:active { transform: scale(0.96); }

  /* FOOTER NAV */
  footer {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: rgba(6, 9, 16, 0.95);
    backdrop-filter: blur(20px);
    display: flex; justify-content: space-around;
    padding: 12px 0 calc(12px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    z-index: 2000;
  }
  .fitem {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    color: var(--text-dim); text-decoration: none; font-size: 11px; font-weight: 700;
  }
  .fitem.active { color: var(--pri); }
  .f-icon { font-size: 18px; margin-bottom: 2px; }

  /* ALERT */
  .alert {
    position: fixed; left: 20px; right: 20px; bottom: 90px;
    padding: 16px; border-radius: 16px;
    background: rgba(239, 68, 68, 0.95);
    color: #fff; font-weight: 700; text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    opacity: 0; pointer-events: none; transform: translateY(10px);
    transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 9999; font-size: 14px;
  }
  .alert.show { opacity: 1; transform: translateY(0); }
</style>
</head>

<div id="toast" class="alert"></div>

<script>
// All original logic and data names kept exactly as requested
const banned = localStorage.getItem('p2pBanned') === 'true';
const namesBuy = ["Gjames Bullstack","Adeyemi Johnson","Grace Olu","Chinedu Kalu","Ngozi Esther","Ibrahim Musa","Bamidele Tayo","Samuel Ojo","Chioma Nneka","Kehinde Afolabi"];
const namesSell = ["Mobolaji Adebambo","Olawale Hassan","Fatima Bello","John Okeke","Blessing Omolara","Ahmed Abubakar","Chika Onoh","Tosin Ayodele","Musa Danjuma","Adaora Eze"];
let currentTab='buy';

function toast(msg, good=false){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background = good ? "rgba(110, 231, 255, 0.95)" : "rgba(239, 68, 68, 0.95)";
  t.style.color = good ? "#060910" : "#fff";
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500);
}

function restrictCurrency(){
  const sel=document.getElementById('currency');
  if(sel.value!=='NGN'){
    sel.value='NGN';
    toast('⚠️ Only NGN trading is supported in your region at this time.');
  }
}

function switchTab(tab){
  currentTab=tab;
  document.getElementById('tabBuy').classList.toggle('active',tab==='buy');
  document.getElementById('tabSell').classList.toggle('active',tab==='sell');
  renderAds();
}

function notEligible(){ toast('❌ Your trade volume is too low for this merchant.'); }
function clickPrimary(){ if(banned){ toast('🚫 Account Restricted.'); return; } location.href='buy.html'; }
function clickSellPrimary(){ if(banned){ toast('🚫 Account Restricted.'); return; } location.href='sell.html'; }

function renderAds(){
  const wrap=document.getElementById('ads');
  wrap.innerHTML='';
  const list = currentTab==='buy'?namesBuy:namesSell;

  list.forEach((n,i)=>{
    const ad=document.createElement('div');
    ad.className='ad';

    // Merchant success rate (simulated)
    const rate = (95 + (i % 5)).toFixed(1);
    const trades = (1200 + (i * 45));

    if(currentTab==='buy'){
      ad.innerHTML=`
        <div class="ad-top">
          <div>
            <div class="name">${n}</div>
          </div>
        </div>
        <div class="price-row">
          <div>
            <div class="meta">Price</div>
            <div class="price">₦ ${(1539.5 + i).toFixed(2)}</div>
          </div>
          <button class="btn">Buy USDT</button>
        </div>
        <div class="meta">
          Limit <strong>₦8,627 – ₦300,000</strong><br>
          Available <strong>${(120+ i*20).toFixed(2)} USDT</strong>
        </div>
      `;
      const btn = ad.querySelector('.btn');
      btn.addEventListener('click', i===0 ? clickPrimary : notEligible);
    } else {
      const qty = (0.0050 + i*0.03).toFixed(4);
      const maxLimit = 478341 + (i*1800000);
      ad.innerHTML=`
        <div class="ad-top">
          <div>
            <div class="name">${n}</div>
          </div>
        </div>
        <div class="price-row">
          <div>
            <div class="meta">Price</div>
            <div class="price">₦ ${(1539.5 + i*50).toFixed(2)}</div>
          </div>
          <button class="btn" style="background: #fff; color: #000;">Sell BTC</button>
        </div>
        <div class="meta">
          Limit <strong>₦300,000 – ₦${maxLimit.toLocaleString()}</strong><br>
          Available <strong>${qty} BTC</strong>
        </div>
      `;
      const btn = ad.querySelector('.btn');
      btn.addEventListener('click', i===0 ? clickSellPrimary : notEligible);
    }
    wrap.appendChild(ad);
  });
}

// Session Timer Logic
const TIMEOUT_DURATION = 60000;
function checkSession() {
  const lastActive = localStorage.getItem('lastActiveTime');
  if (lastActive && (Date.now() - parseInt(lastActive) >= TIMEOUT_DURATION)) {
    localStorage.removeItem('lastActiveTime');
    window.location.href = 'pin.html';
  }
}
function resetTimer() { localStorage.setItem('lastActiveTime', Date.now().toString()); }
['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart'].forEach(e => document.addEventListener(e, resetTimer));
renderAds();
checkSession();
setInterval(checkSession, 2000);
</script>
