<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"/>
<title>NexPay — Orders</title>
<meta name="theme-color" content="#060910"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060910;
    --card: rgba(17, 25, 40, 0.85);
    --border: rgba(255, 255, 255, 0.08);
    --pri: #6ee7ff;
    --text: #f8fafc;
    --text-dim: #94a3b8;
  }

  * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; background-color: var(--bg); overflow-x: hidden; }

  body {
    background-image:
      radial-gradient(at 100% 0%, rgba(124, 58, 237, 0.08) 0px, transparent 50%),
      radial-gradient(at 0% 100%, rgba(110, 231, 255, 0.05) 0px, transparent 50%);
    background-attachment: fixed;
    color: var(--text);
  }

  header {
    padding: 18px 20px; background: rgba(6, 9, 16, 0.8);
    backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 1000;
  }
  header strong { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }

  .list { padding: 20px; max-width: 600px; margin: 0 auto 100px; display: flex; flex-direction: column; gap: 12px; }

  .item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 18px; border-radius: 20px;
    background: var(--card); border: 1px solid var(--border);
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    animation: slideUp 0.4s ease forwards;
  }
  @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .seller-name { font-weight: 700; font-size: 15px; margin-bottom: 4px; color: #fff; }
  .mut { color: var(--text-dim); font-size: 12px; font-weight: 500; }

  .amount { text-align: right; font-weight: 800; font-size: 16px; color: var(--pri); margin-bottom: 4px; }
  .status {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; padding: 4px 8px; border-radius: 6px;
    background: rgba(255,255,255,0.05); text-align: center;
  }

  /* Status Colors */
  .status-in-progress { color: #fbbf24; background: rgba(251, 191, 36, 0.1); }
  .status-completed { color: #10b981; background: rgba(16, 185, 129, 0.1); }
  .status-cancelled { color: #ef4444; background: rgba(239, 68, 68, 0.1); }

  footer {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: rgba(6, 9, 16, 0.95); backdrop-filter: blur(20px);
    display: flex; justify-content: space-around;
    padding: 12px 0 calc(12px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--border); z-index: 2000;
  }
  .fitem { color: var(--text-dim); text-decoration: none; font-size: 12px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .fitem.active { color: var(--pri); }

  .empty {
    margin-top: 60px; text-align: center; padding: 0 40px;
  }
  .empty-icon { font-size: 48px; margin-bottom: 15px; opacity: 0.5; }
  .empty-text { color: var(--text-dim); font-size: 14px; font-weight: 500; line-height: 1.5; }
</style>
</head>
<body>

<header><strong>Order History</strong></header>

<div id="list" class="list"></div>

<div id="empty" class="empty" style="display:none">
  <div class="empty-icon">📁</div>
  <div class="empty-text">You don't have any active or past orders yet.</div>
</div>

<footer>
  <a class="fitem" href="p2p.html">
    <span>⇄</span>
    <span>Market</span>
  </a>
  <a class="fitem active" href="order.html">
    <span>📋</span>
    <span>Orders</span>
  </a>
</footer>

<script>
function fmt(n){ return '₦'+Number(n).toLocaleString(); }

const listEl = document.getElementById('list');
const emptyEl = document.getElementById('empty');
const orders = JSON.parse(localStorage.getItem('orders') || '[]');

if (!orders.length) {
  emptyEl.style.display = 'block';
} else {
  orders.forEach(o => {
    const d = document.createElement('div');
    d.className = 'item';

    // Determine status class
    let statusClass = '';
    const s = o.status.toLowerCase();
    if(s.includes('progress') || s.includes('awaiting')) statusClass = 'status-in-progress';
    else if(s.includes('confirm') || s.includes('complete')) statusClass = 'status-completed';
    else if(s.includes('cancel') || s.includes('expired')) statusClass = 'status-cancelled';

    d.innerHTML = `
      <div>
        <div class="seller-name">${o.seller}</div>
        <div class="mut">${new Date(o.createdAt).toLocaleDateString()} • ${new Date(o.createdAt).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
      </div>
      <div>
        <div class="amount">${fmt(o.amount)}</div>
        <div class="status ${statusClass}">${o.status}</div>
      </div>
    `;
    listEl.appendChild(d);
  });
}

// Session Timer Logic (Consistent with app security)
const TIMEOUT_DURATION = 60000;
function checkSession() {
    const lastActive = localStorage.getItem('lastActiveTime');
    if (lastActive && (Date.now() - parseInt(lastActive) >= TIMEOUT_DURATION)) {
        localStorage.removeItem('lastActiveTime');
        window.location.href = 'pin.html';
    }
}
function resetTimer() { localStorage.setItem('lastActiveTime', Date.now().toString()); }
['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart'].forEach(e => document.addEventListener(e, resetTimer));
checkSession();
setInterval(checkSession, 2000);
</script>

</body>
</html>
