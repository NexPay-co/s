<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"/>
<title>NexPay — Payment</title>
<meta name="theme-color" content="#060910"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060910;
    --card: rgba(17, 25, 40, 0.9);
    --border: rgba(255, 255, 255, 0.08);
    --pri: #6ee7ff;
    --pri2: #7c3aed;
    --text: #f8fafc;
    --text-dim: #94a3b8;
  }

  * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; background-color: var(--bg); overflow-x: hidden; }

  body {
    background-image:
      radial-gradient(at 100% 0%, rgba(124, 58, 237, 0.1) 0px, transparent 50%),
      radial-gradient(at 0% 100%, rgba(110, 231, 255, 0.05) 0px, transparent 50%);
    background-attachment: fixed;
    color: var(--text);
  }

  .shell { display: flex; flex-direction: column; min-height: 100vh; }

  header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 15px 20px; background: rgba(6, 9, 16, 0.8);
    backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 1000;
  }

  .title { font-weight: 800; font-size: 15px; }
  .badge { padding: 6px 12px; border-radius: 100px; background: rgba(110, 231, 255, 0.1); border: 1px solid rgba(110, 231, 255, 0.2); color: var(--pri); font-size: 12px; font-weight: 700; }

  main { padding: 20px; flex: 1; display: flex; flex-direction: column; gap: 20px; }

  .card {
    background: var(--card); backdrop-filter: blur(12px);
    border: 1px solid var(--border); border-radius: 24px;
    padding: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }

  .detail-box { background: rgba(255,255,255,0.03); border-radius: 16px; padding: 16px; margin: 15px 0; border: 1px solid var(--border); }
  .row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; }
  .row:last-child { margin-bottom: 0; }
  .mut { color: var(--text-dim); font-weight: 600; }

  .timer-wrap { text-align: center; margin-bottom: 20px; }
  .timer { font-size: 28px; font-weight: 800; color: #fff; letter-spacing: 1px; }

  .btn {
    width: 100%; padding: 16px; border: none; border-radius: 14px;
    font-weight: 800; font-size: 15px; cursor: pointer;
    background: linear-gradient(135deg, var(--pri), var(--pri2));
    color: #060910; transition: transform 0.1s; margin-bottom: 10px;
  }
  .btn:active { transform: scale(0.97); }

  .btn-ghost {
    width: 100%; padding: 14px; border-radius: 14px;
    background: transparent; border: 1px solid var(--border);
    color: var(--text); font-weight: 700; font-size: 14px; cursor: pointer;
  }

  /* CHAT SECTION */
  #contactBox { display: none; flex-direction: column; gap: 15px; margin-top: 20px; }
  .chat {
    background: rgba(0, 0, 0, 0.3); border-radius: 20px;
    border: 1px solid var(--border); height: 350px; display: flex; flex-direction: column; overflow: hidden;
  }
  .chat-log { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }

  .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.4; position: relative; }
  .me { align-self: flex-end; background: var(--pri); color: #060910; border-bottom-right-radius: 4px; font-weight: 600; }
  .you { align-self: flex-start; background: #1f2937; color: #fff; border-bottom-left-radius: 4px; }

  .chat-input { display: flex; gap: 8px; padding: 12px; background: rgba(6, 9, 16, 0.9); border-top: 1px solid var(--border); }
  .chat-input input[type="text"] { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; padding: 10px; color: #fff; outline: none; }

  .upl-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; padding: 10px; color: var(--pri); font-weight: 700; font-size: 12px; cursor: pointer; }

  footer {
    padding: 12px 0 calc(12px + env(safe-area-inset-bottom));
    background: rgba(6, 9, 16, 0.9); border-top: 1px solid var(--border);
    display: flex; justify-content: space-around;
  }
  .fitem { color: var(--text-dim); text-decoration: none; font-size: 12px; font-weight: 700; }
</style>
</head>
<body>
<div class="shell">
  <header>
    <div class="title">Transfer Funds</div>
    <div class="badge" id="stageBadge">Awaiting Payment</div>
  </header>

  <main>
    <section class="card">
      <div class="timer-wrap">
        <div class="mut" style="font-size: 12px; margin-bottom: 5px;">TIME REMAINING</div>
        <div class="timer" id="timer">00:00</div>
      </div>

      <div class="detail-box">
        <div class="row"><span class="mut">Amount to Pay</span><strong id="amt" style="color: var(--pri); font-size: 18px;">₦0</strong></div>
        <div class="row"><span class="mut">Bank Name</span><strong>PalmPay LTD</strong></div>
        <div class="row" style="flex-direction: column; gap: 5px;">
          <span class="mut">Name: <strong style="color: white; float: right;">Skenttelecoms -Gjames</strong></span>

          <!-- <span class="mut">Bank Account Number: <strong style="color: white; float: right;">663-9385-928</strong></span> -->
          <div style="background: rgba(110, 231, 255, 0.05); padding: 12px; border-radius: 10px; border: 1px dashed var(--pri); text-align: center; font-size: 16px;">
            663 9385 928
          </div>
        </div>
      </div>

      <!-- <div id="instr" style="font-size: 13px; color: #ffd7a8; text-align: center; margin-bottom: 15px;">Transfer only from your registered bank account.</div> -->

      <button class="btn" id="btnComplete">I Have Paid</button>
      <div style="display: flex; gap: 10px;">
        <button class="btn-ghost" id="btnCancel" style="flex: 1;">Cancel</button>
        <button class="btn-ghost" id="toggleChatBtn" style="flex: 2;">Chat with Seller</button>
      </div>

      <div id="contactBox">
        <div class="chat">
          <div id="chatLog" class="chat-log"></div>
          <div class="chat-input">
            <label class="upl-btn" for="img">Attach</label>
            <input id="img" type="file" accept="image/*" style="display:none"/>
            <input id="text" type="text" placeholder="Send a message..."/>
            <button id="sendBtn" style="background:none; border:none; color:var(--pri); font-weight:800; padding:0 10px;">Send</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <a class="fitem" href="p2p.html">Market</a>
    <a class="fitem" href="order.html">Orders</a>
  </footer>
</div>

<script>
/* Logical script preserved exactly from your structure */
const STAGES={MAKE:'make_payment',WAIT_CONFIRM:'await_seller_confirm',UPLOAD_RECEIPT:'await_receipt',REVIEW:'await_review_after_receipt',DONE:'done',BANNED:'banned'};
const fmt=n=>'₦'+Number(n).toLocaleString();
const logEl=document.getElementById('chatLog');
const timerEl=document.getElementById('timer');
const badgeEl=document.getElementById('stageBadge');
const instrEl=document.getElementById('instr');

let order=JSON.parse(localStorage.getItem('currentP2POrder')||'null');
if(!order){location.href='p2p.html';}
document.getElementById('amt').textContent=fmt(order.amount);

function save(){localStorage.setItem('currentP2POrder',JSON.stringify(order));}

function renderChat(){
  logEl.innerHTML='';
  (order.messages||[]).forEach(m=>{
    const d=document.createElement('div');
    d.className='msg '+(m.who==='me'?'me':'you');
    if(m.type==='img'){
      d.innerHTML=`<img src="${m.data}" style="max-width:100%; border-radius:10px; display:block"/><div style="font-size:10px; margin-top:4px; opacity:0.7;">${new Date(m.at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>`;
    }else{
      d.innerHTML=`${m.text}<div style="font-size:10px; margin-top:4px; opacity:0.7;">${new Date(m.at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>`;
    }
    logEl.appendChild(d);
  });
  logEl.scrollTop=logEl.scrollHeight;
}
renderChat();

function maybeAutoReply(){
  if(!order.autoReplyScheduled){
    order.autoReplyScheduled = true;
    setTimeout(()=>{
      order.messages.push({who:'you', type:'text', text:'Drop receipt', at:Date.now()});
      save(); renderChat();
    }, 28000);
  }
}

document.getElementById('sendBtn').onclick=()=>{
  const t=document.getElementById('text');
  if(!t.value.trim())return;
  order.messages.push({who:'me', type:'text', text:t.value.trim(), at:Date.now()});
  save(); renderChat(); t.value=''; maybeAutoReply();
};

document.getElementById('img').onchange=(e)=>{
  const f=e.target.files[0]; if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{
    order.messages.push({who:'me', type:'img', data:rd.result, at:Date.now()});
    save(); renderChat(); maybeAutoReply();
  }; rd.readAsDataURL(f);
};

function updateUI(){
  const btnC=document.getElementById('btnComplete');
  const btnX=document.getElementById('btnCancel');
  if(order.stage===STAGES.MAKE){
    badgeEl.textContent='Make Payment';
    btnC.style.display='block'; btnX.style.display='block';
  } else {
    btnC.style.display='none'; btnX.style.display='none';
    if(order.stage===STAGES.WAIT_CONFIRM) badgeEl.textContent='Verifying...';
    if(order.stage===STAGES.UPLOAD_RECEIPT) {
        badgeEl.textContent='Action Required';
        instrEl.style.color = "#ff5f6d";
        instrEl.textContent = "Confirmation failed. Upload receipt now.";
    }
    if(order.stage===STAGES.REVIEW) badgeEl.textContent='Under Review';
    if(order.stage===STAGES.BANNED) {
        badgeEl.textContent='Suspended';
        instrEl.textContent = "Account restricted due to policy violation.";
    }
  }
}
updateUI();

function tick(){
  if(order.stageEndAt){
    const left=order.stageEndAt-Date.now();
    if(left<=0){
      if(order.stage===STAGES.MAKE){
        localStorage.removeItem('currentP2POrder'); location.href='p2p.html'; return;
      }else if(order.stage===STAGES.WAIT_CONFIRM){
        order.stage=STAGES.UPLOAD_RECEIPT; order.stageEndAt=null; save(); updateUI();
      }else if(order.stage===STAGES.REVIEW){
        localStorage.setItem('p2pBanned','true'); order.stage=STAGES.BANNED; save(); updateUI();
      }
    }
    const d = new Date(left);
    timerEl.textContent=left>0?d.toISOString().substr(14,5):'00:00';
  }
  setTimeout(tick, 1000);
}
tick();

document.getElementById('btnComplete').onclick=()=>{
    order.stage=STAGES.WAIT_CONFIRM;
    order.stageEndAt=Date.now() + 30*60*1000;
    save(); updateUI();
};
document.getElementById('btnCancel').onclick=()=>{ localStorage.removeItem('currentP2POrder'); location.href='p2p.html'; };

document.getElementById('toggleChatBtn').onclick=()=>{
  const box=document.getElementById('contactBox');
  box.style.display=box.style.display==='flex'?'none':'flex';
  if(box.style.display==='flex') logEl.scrollTop=logEl.scrollHeight;
};

// Monitor for receipt upload in "Upload Receipt" stage
const obs=new MutationObserver(()=>{
  if(order.stage===STAGES.UPLOAD_RECEIPT && (order.messages||[]).some(m=>m.type==='img')){
    order.stage=STAGES.REVIEW;
    // order.stageEndAt=Date.now() + 60*60*1000;
    save(); updateUI();
  }
});
obs.observe(logEl, {childList:true});
</script>
</body>
</html>
